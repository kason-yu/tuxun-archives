<!DOCTYPE html>
<html lang="zh-Cn">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>车牌属性表</title>
        <style>
            body {
                background-image: url('图寻学院0.png');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                margin: 0;
                padding: 0;
                min-height: 100vh;
                font-family: Arial, sans-serif;
            }
            .container {
                background-color: rgba(255, 255, 255, 0.8);
                max-width: 80%;
                margin: 40px auto;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
                max-height: 80vh;
                overflow-y: auto;
            }
            .no-vertical-borders td {
                border-left: none !important;
                border-right: none !important;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>车牌属性表</h1>
            <table border="1" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                <tr style="background-color: #f2f2f2;">
                    <th>大类</th>
                    <th>子类</th>
                    <th>典型案例</th>
                </tr>
                <tr class="no-vertical-borders">
                    <td>颜色</td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td>白色</td>
                    <td>世界多数国家，俄罗斯等</td>
                </tr>
                <tr>
                    <td></td>
                    <td>蓝色</td>
                    <td>中国等</td>
                </tr>
                <tr>
                    <td></td>
                    <td>蓝绿色</td>
                    <td>挪威的商业车牌</td>
                </tr>
                <tr>
                    <td></td>
                    <td>黄色</td>
                    <td>中国大车、卢森堡等</td>
                </tr>
                <tr>
                    <td></td>
                    <td>红色</td>
                    <td>巴西的商业汽车</td>
                </tr>
                <tr class="no-vertical-borders">
                    <td>形状</td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td>长车牌</td>
                    <td>欧盟、中国等</td>
                </tr>
                <tr>
                    <td></td>
                    <td>短车牌</td>
                    <td>美国、阿联酋、越南、澳大利亚(部分州)、日本、新西兰、马来西亚、泰国、沙特阿拉伯等</td>
                </tr>
                <tr>
                    <td></td>
                    <td>前长车牌</td>
                    <td>意大利等</td>
                </tr>
                <tr>
                    <td></td>
                    <td>前短车牌</td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td>后长车牌</td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td>后短车牌</td>
                    <td>意大利等</td>
                </tr>
                <tr>
                    <td></td>
                    <td>小车牌</td>
                    <td>瑞士</td>
                </tr>
                <tr class="no-vertical-borders">
                    <td>绘制</td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td>左侧条</td>
                    <td>欧盟国家</td>
                </tr>
                <tr>
                    <td></td>
                    <td>右侧条</td>
                    <td>意大利、阿尔巴尼亚等</td>
                </tr>
                <tr>
                    <td></td>
                    <td>上方条</td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td>下方条</td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td>彩色车牌</td>
                    <td>美国、加拿大</td>
                </tr>
                <tr class="no-vertical-borders">
                    <td>安装</td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td>无前车牌</td>
                    <td></td>
                </tr>
            </table>
        </div>
    </body>
</html>
