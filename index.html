<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>图寻 · 地理工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('assets/图寻学院0.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
            padding: 2rem 1.5rem;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.5s ease;
        }

        .hero h1 {
            font-size: 2.5rem;
            color: #2d6a4f;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .hero p {
            color: #40916c;
            font-size: 1rem;
            font-weight: 500;
        }

        /* 统一卡片网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        /* 统一卡片样式 */
        .tool-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 1rem;
            text-decoration: none;
            border: 1px solid rgba(45, 106, 79, 0.15);
            transition: all 0.25s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .tool-card:hover {
            transform: translateY(-3px);
            background: white;
            box-shadow: 0 8px 20px rgba(45, 106, 79, 0.12);
            border-color: rgba(45, 106, 79, 0.25);
        }

        .card-icon {
            font-size: 2rem;
            width: 50px;
            text-align: center;
        }

        .card-info {
            flex: 1;
        }

        .card-name {
            font-size: 1rem;
            font-weight: 600;
            color: #2d6a4f;
            margin-bottom: 0.2rem;
        }

        .card-desc {
            font-size: 0.7rem;
            color: #74c69d;
        }

        .badge {
            font-size: 0.55rem;
            background: #d8f3dc;
            padding: 2px 6px;
            border-radius: 20px;
            color: #2d6a4f;
            margin-left: 6px;
        }

        /* 分类标题 */
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d6a4f;
            margin: 1.5rem 0 1rem 0;
            padding-left: 0.5rem;
            border-left: 4px solid #2d6a4f;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        /* 底部外链区域 */
        .footer-links {
            margin-top: 2rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(45, 106, 79, 0.2);
        }

        .footer-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2d6a4f;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            border: 1px solid rgba(45, 106, 79, 0.1);
        }

        .footer-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .footer-group-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #52b788;
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
        }

        .footer-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #2b5a47;
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.3rem 0;
            transition: all 0.2s;
        }

        .footer-link:hover {
            color: #1b4d3e;
            transform: translateX(4px);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            .hero h1 { font-size: 1.6rem; }
            .tools-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="hero">
            <h1>🗺️ 图寻 · 地理工具箱</h1>
            <p>国旗 · 车牌 · 语言 · 影像 · 道路标线</p>
        </div>

        <!-- 所有工具统一网格 -->
        <div id="toolsGrid"></div>

        <!-- 底部外链区域 -->
        <div class="footer-links" id="footerLinks"></div>
    </div>

    <script>
        // ============ 所有工具统一配置 ============
        const toolsData = [
            // 核心工具
            { name: "国家筛选", path: "world_map/geo_3.html", icon: "🔍", desc: "多标签交集筛选", category: "核心工具" },
            { name: "国家相似度", path: "world_map/map_world.html", icon: "📊", desc: "国家对比分析", category: "核心工具" },
            { name: "世界影像查询", path: "world_img/world_img.html", icon: "🖼️", desc: "地理影像识别", category: "核心工具" },
            { name: "世界手机号", path: "world_number/world_number.html", icon: "📱", desc: "国际号码识别", category: "核心工具" },
            // 代码与标识
            { name: "国家代码", path: "assets/nation_code.html", icon: "🔢", desc: "国家代码查询", category: "代码与标识" },
            { name: "国旗", path: "assets/national_flag.html", icon: "🏁", desc: "世界各国国旗", category: "代码与标识" },
            { name: "车牌", path: "assets/car_code.html", icon: "🚗", desc: "各国车牌识别", category: "代码与标识" },
            // 人文地理 - 建筑
            { name: "住宅建筑", path: "#", icon: "🏠", desc: "即将上线", disabled: true, category: "建筑" },
            { name: "电线杆", path: "assets/ele_pole.html", icon: "⚡", desc: "电线杆识别", category: "建筑" },
            // 人文地理 - 语言
            { name: "拉丁字母语言", path: "assets/latin_language.html", icon: "🔤", desc: "拉丁字母语言识别", category: "语言" },
            { name: "西里尔字母语言", path: "assets/SEA_language.html", icon: "📖", desc: "西里尔字母语言", category: "语言" },
            { name: "东-南亚语言", path: "assets/SEA_language.html", icon: "✍️", desc: "东-南亚语言识别", category: "语言" },
            { name: "重要概念", path: "assets/important_concept.html", icon: "💡", desc: "重要概念查询", category: "语言" },
            // 人文地理 - 交通
            { name: "道路标线", path: "assets/road_line.html", icon: "🛣️", desc: "道路标线识别", category: "交通" },
            { name: "加油站", path: "assets/petrol_station.html", icon: "⛽", desc: "加油站品牌识别", category: "交通" }
        ];

        const footerData = {
            groups: [
                {
                    title: "图寻生态",
                    items: [
                        { name: "图寻官网", path: "https://tuxun.fun/", icon: "🌐", external: true },
                        { name: "图寻文档", path: "https://www.yuque.com/chaofun/tuxun/", icon: "📘", external: true },
                        { name: "Plonkit", path: "https://www.plonkit.net/", icon: "🗺️", external: true }
                    ]
                },
                {
                    title: "地图服务",
                    items: [
                        { name: "OpenStreetMap", path: "https://www.openstreetmap.org/", icon: "🗺️", external: true },
                        { name: "Google Maps", path: "https://www.google.com/maps/", icon: "📍", external: true },
                        { name: "百度地图", path: "https://map.baidu.com/", icon: "🇨🇳", external: true },
                        { name: "腾讯地图", path: "https://map.qq.com/", icon: "🐧", external: true },
                        { name: "天地图", path: "https://www.tianditu.gov.cn/", icon: "🛰️", external: true }
                    ]
                },
                {
                    title: "数据资源",
                    items: [
                        { name: "GBIF（生物多样性）", path: "https://www.gbif.org/", icon: "🌿", external: true },
                        { name: "查号吧（电话区号）", path: "https://www.chahaoba.com/", icon: "📞", external: true }
                    ]
                }
            ]
        };

        function getLinkTarget(item) {
            if (item.external || (item.path && item.path.startsWith('http'))) {
                return 'target="_blank" rel="noopener noreferrer"';
            }
            return 'target="_self"';
        }

        // 按分类分组工具
        function groupToolsByCategory() {
            const groups = {};
            for (const tool of toolsData) {
                if (!groups[tool.category]) {
                    groups[tool.category] = [];
                }
                groups[tool.category].push(tool);
            }
            return groups;
        }

        // 渲染所有工具（统一卡片形式）
        function renderTools() {
            const container = document.getElementById("toolsGrid");
            const groups = groupToolsByCategory();
            
            // 定义分类显示顺序
            const categoryOrder = ["核心工具", "代码与标识", "建筑", "语言", "交通"];
            
            let html = '';
            for (const category of categoryOrder) {
                const categoryTools = groups[category];
                if (!categoryTools || categoryTools.length === 0) continue;
                
                html += `<div class="section-title">${getCategoryIcon(category)} ${category}</div>`;
                html += `<div class="tools-grid">`;
                
                for (const tool of categoryTools) {
                    const targetAttr = getLinkTarget(tool);
                    if (tool.disabled) {
                        html += `
                            <div class="tool-card" style="opacity:0.6; cursor:not-allowed;">
                                <div class="card-icon">${tool.icon}</div>
                                <div class="card-info">
                                    <div class="card-name">${tool.name} <span class="badge">${tool.desc}</span></div>
                                </div>
                            </div>
                        `;
                    } else {
                        html += `
                            <a href="${tool.path}" class="tool-card" ${targetAttr}>
                                <div class="card-icon">${tool.icon}</div>
                                <div class="card-info">
                                    <div class="card-name">${tool.name}</div>
                                    <div class="card-desc">${tool.desc || ''}</div>
                                </div>
                            </a>
                        `;
                    }
                }
                html += `</div>`;
            }
            
            container.innerHTML = html;
        }

        function getCategoryIcon(category) {
            const icons = {
                "核心工具": "🎯",
                "代码与标识": "📜",
                "建筑": "🏛️",
                "语言": "🔤",
                "交通": "🚗"
            };
            return icons[category] || "📁";
        }

        // 渲染底部外链
        function renderFooter() {
            const container = document.getElementById("footerLinks");
            let groupsHtml = '';
            for (const group of footerData.groups) {
                let itemsHtml = '';
                for (const item of group.items) {
                    const targetAttr = getLinkTarget(item);
                    itemsHtml += `
                        <a href="${item.path}" class="footer-link" ${targetAttr}>
                            <span>${item.icon}</span> ${item.name}
                        </a>
                    `;
                }
                groupsHtml += `
                    <div class="footer-group">
                        <div class="footer-group-title">${group.title}</div>
                        ${itemsHtml}
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="footer-title">🔗 外部链接</div>
                <div class="footer-grid">
                    ${groupsHtml}
                </div>
            `;
        }

        // 初始化
        renderTools();
        renderFooter();
    </script>
</body>
</html>
