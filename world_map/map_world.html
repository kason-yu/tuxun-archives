<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>国家相似度地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* 导航栏样式 */
    #navbar {
      padding: 10px 20px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      flex-shrink: 0;
      min-height: 60px;
    }

    /* 搜索区域 */
    .search-group { position: relative; display: flex; align-items: center; gap: 8px; }
    #column-search { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }

    /* 搜索结果下拉框 */
    .search-results {
      position: absolute; top: 100%; left: 0; margin-top: 5px;
      background: white; border: 1px solid #ddd; border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-height: 200px; overflow-y: auto;
      z-index: 1000; display: none; min-width: 200px;
    }
    .search-results.active { display: block; }
    .search-result-item { padding: 8px 12px; cursor: pointer; font-size: 14px; }
    .search-result-item:hover { background: #f0f0f0; }

    /* 选中的列标签 */
    .selected-columns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .selected-column-tag {
      background: #e1f5fe; color: #01579b; padding: 4px 8px; border-radius: 4px;
      font-size: 12px; display: flex; align-items: center; gap: 4px;
    }
    .tag-close { cursor: pointer; font-weight: bold; font-size: 10px; }

    /* 提示框 */
    #tooltip {
      position: absolute; background: #333; color: #fff; padding: 5px 10px;
      border-radius: 4px; font-size: 14px; pointer-events: none; display: none; z-index: 999;
    }

    /* 地图容器 */
    #svg-container {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 10px; overflow: hidden; width: 100%; height: calc(100vh - 80px);
    }
    #svg-container svg { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  </style>
</head>

<body>
  <div id="navbar">
    <div class="search-group">
      <input type="text" id="column-search" placeholder="搜索列名...">
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="selected-columns" id="selected-columns"></div>
  </div>

  <div id="svg-container"></div>
  <div id="tooltip"></div>

  <script>
    let csvData = [];
    let csvHeaders = ["国家"];
    let selectedColumns = [];

    // ========== 核心修复：正确的CSV解析器（第一列强制为国家列，彻底避免列错位） ==========
    function parseCSVCorrectly(csvText) {
      if (!csvText || csvText.trim() === "") return { headers: ["国家"], data: [] };
      
      // 按行分割（兼容Windows/Mac换行）
      const lines = csvText.trim().split(/\r?\n/).filter(line => line.trim() !== "");
      if (lines.length === 0) return { headers: ["国家"], data: [] };

      // 解析表头：第一行从第二列开始是数据列名，第一列强制为"国家"
      const firstLine = splitCSVLine(lines[0]);
      const headers = ["国家", ...firstLine.slice(1)]; // 关键修复：不再unshift，直接正确拼接

      // 解析数据行：第一列是国家名，后续是数据值
      const data = lines.slice(1).map(line => {
        const values = splitCSVLine(line);
        const row = {};
        headers.forEach((header, idx) => {
          const rawVal = values[idx] !== undefined ? values[idx].trim() : "";
          // 严格数值转换：只有纯数字字符串才转数字，否则保持字符串
          row[header] = !isNaN(rawVal) && rawVal !== "" ? Number(rawVal) : rawVal;
        });
        return row;
      }).filter(row => row["国家"]); // 过滤掉无国家名的行

      return { headers, data };
    }

    // 辅助：正确拆分CSV单行（兼容带引号的字段）
    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      result.push(current);
      return result;
    }

    // 初始化
    Promise.all([
      fetch("world.svg").then(res => res.text()),
      fetch("nation_like.csv").then(res => res.text()).catch(err => {
        console.warn("⚠️ nation_like.csv 读取失败，使用空数据");
        return "国家";
      })
    ]).then(([svgCode, csvText]) => {
      document.getElementById("svg-container").innerHTML = svgCode;
      
      // 使用修复后的解析器
      const parsed = parseCSVCorrectly(csvText);
      csvHeaders = parsed.headers;
      csvData = parsed.data;
      
      initMap();
      bindEvents();
      console.log("✅ 初始化完成");
      console.log("📊 表头：", csvHeaders);
      console.log("📈 前3行数据：", csvData.slice(0, 3));
    }).catch(err => {
      console.error("❌ 加载失败：", err);
      alert("SVG文件加载失败，请检查路径");
    });

    // 标准化国家名
    function normalizeCountryName(name) {
      return name ? name.trim().toLowerCase() : "";
    }

    // 匹配国家行
    function getCountryRow(countryKey) {
      return csvData.find(row => normalizeCountryName(row["国家"]) === countryKey);
    }

    // 初始化地图
    function initMap() {
      const tooltip = document.getElementById("tooltip");
      const paths = document.querySelectorAll("path");

      paths.forEach(path => {
        const cls = path.className?.baseVal || "";
        const name = path.getAttribute("name") || "";
        const originalName = cls.trim() || name.trim();
        const countryKey = normalizeCountryName(originalName);
        if (!countryKey) return;

        updateCountryColor(path, countryKey, originalName);

        // 鼠标悬停提示
        path.addEventListener("mouseenter", () => {
          tooltip.innerText = originalName;
          tooltip.style.display = "block";
        });
        path.addEventListener("mousemove", (e) => {
          tooltip.style.left = e.pageX + 10 + "px";
          tooltip.style.top = e.pageY + 10 + "px";
        });
        path.addEventListener("mouseleave", () => {
          tooltip.style.display = "none";
        });
      });
    }

    // 颜色更新（仅显示模式）
    function updateCountryColor(path, countryKey, originalName) {
      if (selectedColumns.length === 0) {
        path.style.fill = "#ffffff";
        return;
      }

      const countryRow = getCountryRow(countryKey);
      if (!countryRow) {
        path.style.fill = "#ffffff";
        return;
      }

      // 计算选中列的总和
      let total = 0;
      selectedColumns.forEach(col => {
        const val = countryRow[col];
        total += typeof val === "number" ? val : 0;
      });

      // 计算全局最大值用于归一化
      const allValues = csvData.map(row => {
        let sum = 0;
        selectedColumns.forEach(col => {
          const val = row[col];
          sum += typeof val === "number" ? val : 0;
        });
        return sum;
      });
      const maxVal = Math.max(...allValues, 1); // 避免除以0
      const normalized = Math.min(Math.max(total / maxVal, 0), 1);

      // 红色梯度：值越大颜色越深
      const r = 255;
      const g = Math.floor(255 * (1 - normalized));
      const b = Math.floor(255 * (1 - normalized));
      path.style.fill = `rgb(${r}, ${g}, ${b})`;
    }

    // 刷新所有国家颜色
    function refreshMapColors() {
      const paths = document.querySelectorAll("path");
      paths.forEach(path => {
        const cls = path.className?.baseVal || "";
        const name = path.getAttribute("name") || "";
        const originalName = cls.trim() || name.trim();
        const countryKey = normalizeCountryName(originalName);
        if (countryKey) updateCountryColor(path, countryKey, originalName);
      });
    }

    // 渲染搜索结果
    function renderSearchResults(keyword) {
      const searchResults = document.getElementById("search-results");
      searchResults.innerHTML = "";
      
      // 过滤掉"国家"列，只显示数据列
      const dataColumns = csvHeaders.filter(h => h !== "国家");
      const lowerKeyword = keyword ? keyword.toLowerCase().trim() : "";
      
      // 匹配列名
      const matchedColumns = dataColumns.filter(col => {
        const isUnselected = !selectedColumns.includes(col);
        const isMatched = !lowerKeyword || col.toLowerCase().includes(lowerKeyword);
        return isUnselected && isMatched;
      });

      if (matchedColumns.length === 0) {
        searchResults.classList.remove("active");
        return;
      }

      matchedColumns.forEach(col => {
        const item = document.createElement("div");
        item.className = "search-result-item";
        item.textContent = col;
        item.addEventListener("click", () => selectColumn(col));
        searchResults.appendChild(item);
      });
      
      searchResults.classList.add("active");
    }

    // 选择列
    function selectColumn(colName) {
      if (!selectedColumns.includes(colName)) {
        selectedColumns.push(colName);
        renderSelectedColumns();
        refreshMapColors();
      }
      document.getElementById("search-results").classList.remove("active");
      document.getElementById("column-search").value = "";
    }

    // 渲染选中的列标签
    function renderSelectedColumns() {
      const container = document.getElementById("selected-columns");
      container.innerHTML = "";
      
      selectedColumns.forEach(col => {
        const tag = document.createElement("div");
        tag.className = "selected-column-tag";
        tag.innerHTML = `${col}<span class="tag-close" data-col="${col}">×</span>`;
        tag.querySelector(".tag-close").addEventListener("click", (e) => {
          selectedColumns = selectedColumns.filter(c => c !== e.target.dataset.col);
          renderSelectedColumns();
          refreshMapColors();
        });
        container.appendChild(tag);
      });
    }

    // 绑定事件
    function bindEvents() {
      const searchInput = document.getElementById("column-search");
      const searchResults = document.getElementById("search-results");

      searchInput.addEventListener("input", (e) => renderSearchResults(e.target.value));
      searchInput.addEventListener("focus", () => renderSearchResults(searchInput.value));
      
      // 点击外部关闭搜索结果
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-group")) searchResults.classList.remove("active");
      });
    }
  </script>
</body>
</html>
